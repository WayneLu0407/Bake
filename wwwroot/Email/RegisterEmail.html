<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎加入我們！</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f7f9; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">
    <!-- 背景容器 -->
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f7f9;">
        <tr>
            <td align="center" style="padding: 40px 10px;">
                <!-- 主卡片 -->
                <table border="0" cellpadding="0" cellspacing="0" width="600" style="max-width: 600px; width: 100%; background-color: #ffffff; border-radius: 8px; border-collapse: separate; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">

                    <!-- 頁首：漸層背景 -->
                    <tr>
                        <td align="center" style="background: #667eea linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px 20px;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 28px; font-weight: bold; letter-spacing: 2px; font-family: Arial, sans-serif;">歡迎加入！</h1>
                        </td>
                    </tr>

                    <!-- 主要內容區 -->
                    <tr>
                        <td style="padding: 40px; color: #333333; line-height: 1.6; font-family: Arial, sans-serif;">
                            <h2 style="margin-top: 0; color: #4a4a4a; font-size: 22px;">哈囉，新朋友！</h2>
                            <p style="font-size: 16px; margin-bottom: 20px;">您的帳號已成功建立。我們很高興能邀請您一起開啟這段旅程。以下是您的帳號相關資訊：</p>

                            <!-- 資訊卡片：模擬邊框與背景 -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f8f9fa; border-left: 4px solid #667eea; margin: 20px 0;">
                                <tr>
                                    <td style="padding: 15px;">
                                        <p style="margin: 5px 0; font-size: 15px; color: #333333;"><strong>註冊信箱：</strong> {{UserEmail}}</p>
                                        <p style="margin: 5px 0; font-size: 15px; color: #333333;"><strong>會員編號：</strong> #8882024</p>
                                    </td>
                                </tr>
                            </table>

                            <p style="font-size: 16px;">現在您可以點擊下方按鈕，開始探索您的專屬儀表板並設定您的個人檔案。</p>

                            <!-- 按鈕區 -->
                            <table border="0" cellpadding="0" cellspacing="0" style="margin-top: 30px; width: 100%;">
                                <tr>
                                    <td align="center">
                                        <table border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td align="center" bgcolor="#667eea" style="border-radius: 5px;">
                                                    <a href="{{VerifyUrl}}" target="_blank" style="padding: 15px 30px; color: #ffffff; text-decoration: none; font-size: 18px; font-weight: bold; display: inline-block; font-family: Arial, sans-serif;">立即登入帳號</a>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                            <hr style="border: 0; border-top: 1px solid #eeeeee; margin: 40px 0;">
                            <p style="font-size: 14px; color: #777777; text-align: center;">如果您有任何問題，請隨時聯絡我們的支援團隊。我們很樂意為您提供幫助！</p>
                        </td>
                    </tr>

                    <!-- 頁尾 -->
                    <tr>
                        <td align="center" style="background-color: #f1f1f1; padding: 20px; font-size: 12px; color: #999999; font-family: Arial, sans-serif;">
                            <p style="margin: 5px 0;">© 2026 SweetStack甜點棧. 版權所有</p>
                            <p style="margin: 10px 0;">
                                <a href="#" style="color: #667eea; text-decoration: none; margin: 0 10px;">隱私權政策</a> |
                                <a href="#" style="color: #667eea; text-decoration: none; margin: 0 10px;">取消訂閱</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
