<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設您的密碼</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Microsoft JhengHei', sans-serif; background-color: #f4f4f7; color: #51545e;">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color: #f4f4f7; padding: 25px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden;">
                    <!-- 標頭 -->
                    <tr>
                        <td style="padding: 30px; background-color: #4A90E2; text-align: center;">
                            <h1 style="margin: 0; color: #ffffff; font-size: 24px;">[SweetStack甜點棧]</h1>
                        </td>
                    </tr>
                    <!-- 內容 -->
                    <tr>
                        <td style="padding: 40px;">
                            <h2 style="margin-top: 0; color: #333333; font-size: 20px;">您好，</h2>
                            <p style="font-size: 16px; line-height: 1.6; color: #51545e;">
                                我們收到了重設您帳戶密碼的請求。若這確實是您本人發出的，請點擊下方按鈕以設定新密碼：
                            </p>
                            <!-- 按鈕 -->
                            <table width="100%" border="0" cellspacing="0" cellpadding="0" style="margin: 30px 0;">
                                <tr>
                                    <td align="center">
                                        <a href="{{VerifyUrl}}"
                                           style="background-color: #4A90E2; color: #ffffff; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; font-size: 16px;">
                                            重設密碼
                                        </a>
                                    </td>
                                </tr>
                            </table>
                            <p style="font-size: 14px; line-height: 1.6; color: #74787e;">
                                <strong>提醒：</strong> 為了您的帳戶安全，此連結將在 30 分鐘後失效。
                            </p>
                            <p style="font-size: 14px; line-height: 1.6; color: #74787e; border-top: 1px solid #eaeaef; padding-top: 20px; margin-top: 20px;">
                                如果您並未要求重設密碼，請忽略此封信件。您的密碼將保持不變，無需採取進一步行動。
                            </p>
                        </td>
                    </tr>
                    <!-- 頁尾 -->
                    <tr>
                        <td style="padding: 20px; background-color: #f8f8fb; text-align: center; font-size: 12px; color: #b0adc5;">
                            <p style="margin: 0;">© 2026 [SweetStack甜點棧]. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
